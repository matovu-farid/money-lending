<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#022c22"/>
    </linearGradient>
    <!-- Gold gradient for crown -->
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="60%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <!-- Subtle shine overlay -->
    <linearGradient id="shine" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="240" height="240" rx="52" fill="url(#bg)"/>

  <!-- Subtle shine -->
  <rect width="240" height="240" rx="52" fill="url(#shine)"/>

  <!-- Thin border -->
  <rect x="2" y="2" width="236" height="236" rx="50"
        fill="none" stroke="#34d399" stroke-opacity="0.2" stroke-width="1.5"/>

  <!-- Crown - sovereign symbol -->
  <path d="M72 118 L72 78 L96 98 L120 68 L144 98 L168 78 L168 118 Z"
        fill="url(#gold)"/>

  <!-- Crown base band -->
  <rect x="68" y="118" width="104" height="14" rx="3" fill="url(#gold)"/>

  <!-- Crown jewels -->
  <circle cx="120" cy="82" r="5" fill="#dc2626"/>
  <circle cx="96" cy="96" r="3.5" fill="#22d3ee"/>
  <circle cx="144" cy="96" r="3.5" fill="#22d3ee"/>

  <!-- Ledger lines -->
  <line x1="78" y1="150" x2="162" y2="150" stroke="#6ee7b7" stroke-opacity="0.6" stroke-width="2" stroke-linecap="round"/>
  <line x1="78" y1="162" x2="142" y2="162" stroke="#6ee7b7" stroke-opacity="0.4" stroke-width="2" stroke-linecap="round"/>
  <line x1="78" y1="174" x2="152" y2="174" stroke="#6ee7b7" stroke-opacity="0.25" stroke-width="2" stroke-linecap="round"/>
</svg>
proxy_cache_path /var/cache/nginx/electric
                 levels=1:2
                 keys_zone=electric:50m
                 max_size=2g
                 inactive=1h
                 use_temp_path=off;

upstream electric_upstream {
    server electric:3000;
    keepalive 32;
}

# Map ?live=true to a bypass flag so long-poll requests skip the cache entirely.
# Electric also returns Cache-Control: no-store on live requests, but bypassing
# at the routing layer avoids any chance of cache-lock contention.
map $arg_live $electric_bypass_cache {
    default 0;
    "true"  1;
    "1"     1;
}

server {
    listen 3000 default_server;
    server_name _;

    # Drop garbage from internet scanners silently — RDP/MGLNDD/etc. probes
    # were filling Electric's logs with Bandit.HTTPError noise.
    if ($request_method !~ ^(GET|HEAD|POST|PUT|DELETE|OPTIONS|PATCH)$) {
        return 444;
    }

    # Health endpoint — never cache.
    location = /v1/health {
        proxy_pass http://electric_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_cache off;
    }

    location / {
        proxy_pass http://electric_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # Long-poll friendly. Buffering must stay on for caching to work.
        proxy_buffering          on;
        proxy_read_timeout       1h;
        proxy_send_timeout       1h;
        proxy_connect_timeout    10s;

        # Cache configuration — respects upstream Cache-Control / ETag headers.
        # Electric sets Cache-Control: no-store on live=true requests and
        # public, max-age=... on immutable historical chunks.
        proxy_cache             electric;
        proxy_cache_bypass      $electric_bypass_cache;
        proxy_no_cache          $electric_bypass_cache;
        proxy_cache_lock        on;
        proxy_cache_lock_timeout 30s;
        proxy_cache_revalidate  on;
        proxy_cache_background_update on;
        proxy_cache_use_stale   error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_key         "$scheme$proxy_host$uri$is_args$args";

        add_header X-Cache-Status $upstream_cache_status always;
    }
}

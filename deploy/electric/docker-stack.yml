version: "3.8"

services:
  electric:
    image: electricsql/electric:latest
    ports:
      - "3001:3000"
    environment:
      # Direct (non-pooled) Neon connection — required for logical replication.
      # IMPORTANT: Do NOT use the -pooler URL. Remove channel_binding param.
      DATABASE_URL: ${ELECTRIC_DATABASE_URL}
      # Secret used to authenticate shape requests from the Next.js proxy.
      ELECTRIC_SECRET: ${ELECTRIC_SECRET}
      # Persistent storage for shape logs and replication state.
      ELECTRIC_STORAGE_DIR: /var/lib/electric/data
      # Logging
      ELECTRIC_LOG_LEVEL: ${ELECTRIC_LOG_LEVEL:-info}
      # Disable anonymous telemetry
      ELECTRIC_USAGE_REPORTING: "false"
    volumes:
      - electric_data:/var/lib/electric/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/v1/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  electric_data:
    driver: local

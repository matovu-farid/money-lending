version: "3.8"

services:
  postgres:
    image: postgres:17
    # Published on the host so Vercel functions and local drizzle-kit can
    # reach it. Internal traffic (Electric) uses the overlay network and
    # the service name `postgres` instead.
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: money
      POSTGRES_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD must be set}
      POSTGRES_DB: money_lending
      # PGDATA in a subdirectory so the volume root can hold other artifacts
      # (TLS certs) without confusing the entrypoint's empty-dir check.
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Inline command does two things on every start:
    #   1. Generate a self-signed cert into the data volume if absent
    #      (idempotent — first boot only).
    #   2. Exec the upstream entrypoint with the runtime flags Electric
    #      needs (logical replication) plus TLS enabled.
    # postgres:17 (Debian) includes openssl out of the box, so no apk/apt.
    command:
      - bash
      - -c
      - |
        set -e
        CERT_DIR=/var/lib/postgresql/data/certs
        if [ ! -f "$$CERT_DIR/server.crt" ]; then
          mkdir -p "$$CERT_DIR"
          openssl req -new -x509 -days 3650 -nodes -text \
            -out "$$CERT_DIR/server.crt" \
            -keyout "$$CERT_DIR/server.key" \
            -subj "/CN=money-lending-postgres"
          chmod 600 "$$CERT_DIR/server.key"
          chown -R postgres:postgres "$$CERT_DIR"
        fi
        exec docker-entrypoint.sh postgres \
          -c ssl=on \
          -c ssl_cert_file=$$CERT_DIR/server.crt \
          -c ssl_key_file=$$CERT_DIR/server.key \
          -c wal_level=logical \
          -c max_wal_senders=10 \
          -c max_replication_slots=10 \
          -c shared_buffers=128MB \
          -c effective_cache_size=384MB \
          -c max_connections=100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U money -d money_lending"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
      placement:
        constraints:
          # CRITICAL: pin postgres to a specific node because the volume is
          # `driver: local` — it lives on whichever node the container ran on.
          # If swarm reschedules postgres to a different node, it gets a fresh
          # empty volume there and the old data is orphaned. The label is
          # applied with: docker node update --label-add tier=data <node>
          - node.labels.tier == data
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  electric:
    image: electricsql/electric:latest
    # No host port — only nginx is reachable from outside the swarm.
    # Services on the same overlay network can reach each other on any port
    # without an explicit `expose:`, which compose v3 deprecated.
    environment:
      # After cutover this points at the local `postgres` service over the
      # overlay network (postgres://money:PASS@postgres:5432/money_lending).
      # Before cutover it can still point at Neon's direct URL — Electric
      # doesn't care, the connection string is opaque to the stack.
      DATABASE_URL: ${ELECTRIC_DATABASE_URL}
      # Secret used to authenticate shape requests from the Next.js proxy.
      ELECTRIC_SECRET: ${ELECTRIC_SECRET}
      # Persistent storage for shape logs and replication state.
      ELECTRIC_STORAGE_DIR: /var/lib/electric/data
      # Logging
      ELECTRIC_LOG_LEVEL: ${ELECTRIC_LOG_LEVEL:-info}
      # Disable anonymous telemetry
      ELECTRIC_USAGE_REPORTING: "false"
    volumes:
      - electric_data:/var/lib/electric/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/v1/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        # No max_attempts — swarm should keep retrying with backoff. A
        # bounded count gets the service stuck after transient issues
        # (DNS, dependency not ready) without ever recovering.
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "3001:3000"
    configs:
      - source: electric_nginx_conf
        target: /etc/nginx/conf.d/default.conf
    volumes:
      - nginx_cache:/var/cache/nginx/electric
    # No healthcheck. nginx is a simple proxy — if the process is alive,
    # it's healthy. Swarm's `restart_policy: on-failure` already restarts
    # the task if nginx dies, which is the only failure mode that
    # matters here. Adding wget-based HTTP probes was producing false
    # negatives (wget exit codes in busybox alpine were not reliable
    # under load or for empty 200 responses), causing swarm to kill
    # perfectly healthy tasks every ~60s in a restart loop.
    depends_on:
      - electric
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        # No max_attempts — swarm should keep retrying with backoff. A
        # bounded count gets the service stuck after transient issues
        # (DNS, dependency not ready) without ever recovering.
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M

configs:
  electric_nginx_conf:
    # Swarm configs are immutable — to change content you must publish a
    # new config under a new name. The deploy script sets NGINX_CONF_HASH
    # to a SHA256 prefix of nginx.conf so the name auto-rotates only when
    # content actually changes. Identical content → identical name → noop.
    name: electric_nginx_${NGINX_CONF_HASH:?NGINX_CONF_HASH must be set by deploy script}
    file: ./nginx.conf

volumes:
  electric_data:
    driver: local
  nginx_cache:
    driver: local
  postgres_data:
    driver: local

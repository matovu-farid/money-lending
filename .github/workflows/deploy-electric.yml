name: Deploy ElectricSQL

on:
  push:
    branches: [main]
    paths:
      - "deploy/electric/**"
      - ".github/workflows/deploy-electric.yml"
  pull_request:
    paths:
      - "deploy/electric/**"
      - ".github/workflows/deploy-electric.yml"
  workflow_dispatch:

jobs:
  validate:
    name: Validate stack and nginx config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-stack.yml syntax
        env:
          ELECTRIC_DATABASE_URL: postgres://stub
          ELECTRIC_SECRET: stub
          NGINX_CONF_HASH: stub
        run: |
          # `docker compose config` understands the v3.8 compose schema and
          # will fail fast on YAML errors, unknown keys, or bad references.
          docker compose -f deploy/electric/docker-stack.yml config --quiet

      - name: Validate nginx.conf
        run: |
          # We use a variable in proxy_pass + the Docker embedded resolver,
          # so nginx defers `electric` DNS resolution to request time.
          # That means `nginx -t` validates cleanly without needing the
          # service to exist.
          docker run --rm \
            -v "$PWD/deploy/electric/nginx.conf:/etc/nginx/conf.d/default.conf:ro" \
            nginx:1.27-alpine nginx -t

  deploy:
    name: Deploy to swarm
    needs: validate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: electric-deploy
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Copy stack files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ELECTRIC_SSH_HOST }}
          username: ${{ secrets.ELECTRIC_SSH_USER }}
          key: ${{ secrets.ELECTRIC_SSH_KEY }}
          source: "deploy/electric/docker-stack.yml,deploy/electric/nginx.conf"
          target: "~/electric-deploy/"
          strip_components: 2
          overwrite: true

      - name: Deploy stack
        uses: appleboy/ssh-action@v1
        env:
          ELECTRIC_DATABASE_URL: ${{ secrets.ELECTRIC_DATABASE_URL }}
          ELECTRIC_SECRET: ${{ secrets.ELECTRIC_SECRET }}
        with:
          host: ${{ secrets.ELECTRIC_SSH_HOST }}
          username: ${{ secrets.ELECTRIC_SSH_USER }}
          key: ${{ secrets.ELECTRIC_SSH_KEY }}
          envs: ELECTRIC_DATABASE_URL,ELECTRIC_SECRET
          command_timeout: 5m
          script: |
            set -euo pipefail

            # Idempotent — `docker swarm init` is a no-op once the node is a manager.
            docker swarm init 2>/dev/null || true

            # Pull pinned images up front so deploy doesn't stall on first start.
            docker pull electricsql/electric:latest
            docker pull nginx:1.27-alpine

            cd ~/electric-deploy

            export ELECTRIC_DATABASE_URL="$ELECTRIC_DATABASE_URL"
            export ELECTRIC_SECRET="$ELECTRIC_SECRET"
            export ELECTRIC_LOG_LEVEL=info

            # Hash nginx.conf content so the swarm config gets a new name
            # whenever content changes — swarm configs are immutable, this
            # is the standard rotation pattern.
            export NGINX_CONF_HASH=$(sha256sum nginx.conf | cut -c1-12)
            echo "nginx.conf hash: $NGINX_CONF_HASH"

            # If a previous deployment has electric_electric publishing port
            # 3001 directly (pre-nginx layout), nginx can't claim that ingress
            # port until the old service is removed. Detect and tear down the
            # stack first — named volumes (electric_data) survive stack rm,
            # so no replication state is lost.
            if docker service inspect electric_electric \
                 --format '{{range .Endpoint.Spec.Ports}}{{.PublishedPort}} {{end}}' \
                 2>/dev/null | grep -qw 3001; then
              echo "Detected legacy port mapping on electric_electric — removing stack to free port 3001..."
              docker stack rm electric
              for i in $(seq 1 30); do
                sleep 2
                REMAINING=$(docker service ls --filter label=com.docker.stack.namespace=electric -q | wc -l)
                NETWORKS=$(docker network ls --filter label=com.docker.stack.namespace=electric -q | wc -l)
                if [ "$REMAINING" = "0" ] && [ "$NETWORKS" = "0" ]; then
                  echo "Stack fully torn down."
                  break
                fi
                echo "  Waiting for stack teardown ($i/30): services=$REMAINING networks=$NETWORKS"
              done
              # Belt-and-braces wait for ingress port release.
              sleep 5
            fi

            # --resolve-image always picks up newer :latest digests on each deploy.
            # --prune removes services that no longer exist in the stack file.
            docker stack deploy \
              -c docker-stack.yml \
              --resolve-image always \
              --prune \
              electric

            echo "Waiting for stack to converge..."
            for i in $(seq 1 40); do
              sleep 3
              ELECTRIC_REPLICAS=$(docker service ls --filter name=electric_electric --format '{{.Replicas}}')
              NGINX_REPLICAS=$(docker service ls --filter name=electric_nginx --format '{{.Replicas}}')
              echo "  Attempt $i/40: electric=$ELECTRIC_REPLICAS nginx=$NGINX_REPLICAS"

              # Health endpoint is served by nginx (cache-bypassed) and proxied to Electric.
              if curl -sf http://127.0.0.1:3001/v1/health > /dev/null 2>&1; then
                echo "Electric is healthy via nginx!"
                curl -s http://127.0.0.1:3001/v1/health
                echo
                break
              fi

              if [ "$i" = "40" ]; then
                echo "ERROR: Stack did not become healthy in time."
                docker service ps electric_electric --no-trunc || true
                docker service ps electric_nginx --no-trunc || true
                docker service logs --tail 100 electric_electric || true
                docker service logs --tail 100 electric_nginx || true
                exit 1
              fi
            done

            # Smoke test: confirm nginx is actually in front (not bypassed by an
            # old config). The X-Cache-Status header is added by our nginx.conf,
            # so its presence is a positive signal that traffic is going through it.
            echo "Verifying nginx caching layer is in the request path..."
            HEADERS=$(curl -sI http://127.0.0.1:3001/v1/health)
            echo "$HEADERS"
            if ! echo "$HEADERS" | grep -qi '^x-cache-status:'; then
              echo "ERROR: X-Cache-Status header missing — request did not traverse nginx."
              exit 1
            fi
            echo "nginx caching layer confirmed in request path."

            # Clean up orphaned versions of the nginx config (older hashes
            # that no service references). Best-effort — `docker config rm`
            # refuses to remove configs still in use, which is what we want.
            echo "Cleaning up orphaned nginx config versions..."
            for cfg in $(docker config ls --filter name=electric_nginx_ --format '{{.Name}}'); do
              if [ "$cfg" != "electric_nginx_$NGINX_CONF_HASH" ]; then
                docker config rm "$cfg" 2>/dev/null && echo "  removed $cfg" || true
              fi
            done

name: Backup Postgres to S3

on:
  schedule:
    # Sunday 03:00 UTC — well outside any waking-hour window in either of
    # our user-facing timezones, and during Hetzner's lowest network load.
    - cron: "0 3 * * 0"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you triggering this manually? (logged in run history)"
        required: false
        default: "manual-test"

# OIDC needs id-token: write so GH can mint the JWT we exchange with AWS.
# contents: read is the default but explicit here for clarity.
permissions:
  id-token: write
  contents: read

# Only one backup run at a time — overlapping runs would fight over the
# replication slot snapshot or produce two near-identical dumps.
concurrency:
  group: backup-postgres
  cancel-in-progress: false

jobs:
  backup:
    name: Dump postgres and upload to S3
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Configure AWS credentials via OIDC
        # Exchanges GitHub's OIDC JWT for short-lived AWS credentials. No
        # long-lived keys stored anywhere. Credentials live ~1 hour, only
        # exist in this job's environment.
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_BACKUP_ROLE_ARN }}
          role-session-name: gh-backup-${{ github.run_id }}
          aws-region: af-south-1

      - name: Verify AWS identity
        run: |
          aws sts get-caller-identity
          # No bucket-level probe — the role only has s3:PutObject, so any
          # read or list call would correctly fail. The real auth proof is
          # the actual upload in the next step succeeding.

      - name: Dump postgres, validate, upload to S3
        env:
          SSH_KEY: ${{ secrets.ELECTRIC_SSH_KEY }}
          SSH_HOST: ${{ secrets.ELECTRIC_SSH_HOST }}
          SSH_USER: ${{ secrets.ELECTRIC_SSH_USER }}
          PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_node
          chmod 600 ~/.ssh/id_node
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          DATE=$(date -u +%F)
          KEY="money-lending/dump_${DATE}.pgcustom"
          DUMP=/tmp/dump.pgcustom

          echo "Dumping postgres on node1 to runner ($DUMP)..."
          # Dump to a local file first so we can size/magic-check BEFORE
          # uploading. Verifying after upload would need s3:GetObject which
          # we deliberately don't grant — defence-in-depth: a leaked role
          # can write garbage but can't read existing backups.
          #
          # Custom format (-Fc) is internally zlib-compressed; no extra gzip.
          # --no-owner --no-acl makes the dump restore-portable across roles.
          ssh -i ~/.ssh/id_node -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" \
            "docker run --rm --network host -e PGPASSWORD='$PG_PASSWORD' postgres:17 \
              pg_dump -Fc --no-owner --no-acl \
              'host=127.0.0.1 port=5432 user=money dbname=money_lending sslmode=require'" \
            > "$DUMP"

          SIZE=$(wc -c < "$DUMP")
          echo "Dump size: ${SIZE} bytes"

          # Sanity floor — current dataset is ~82KB. A truncated dump from
          # some upstream pg_dump warning we missed would be tiny. Floor
          # catches that without false-positiving as the DB grows.
          if [ "$SIZE" -lt 10000 ]; then
            echo "ERROR: dump is suspiciously small (<10KB) — aborting upload."
            exit 1
          fi

          # pg_dump custom-format files start with magic bytes "PGDMP".
          if ! head -c 5 "$DUMP" | grep -q "PGDMP"; then
            echo "ERROR: dump does not start with PGDMP magic — corrupt."
            exit 1
          fi

          echo "Uploading to s3://fidexa-db-backups/${KEY}..."
          aws s3 cp "$DUMP" "s3://fidexa-db-backups/${KEY}" \
            --storage-class STANDARD_IA

          echo "Backup uploaded: s3://fidexa-db-backups/${KEY} (${SIZE} bytes)"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_node

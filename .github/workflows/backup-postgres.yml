name: Backup Postgres to S3

on:
  schedule:
    # Sunday 03:00 UTC — well outside any waking-hour window in either of
    # our user-facing timezones, and during Hetzner's lowest network load.
    - cron: "0 3 * * 0"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you triggering this manually? (logged in run history)"
        required: false
        default: "manual-test"

# OIDC needs id-token: write so GH can mint the JWT we exchange with AWS.
# contents: read is the default but explicit here for clarity.
permissions:
  id-token: write
  contents: read

# Only one backup run at a time — overlapping runs would fight over the
# replication slot snapshot or produce two near-identical dumps.
concurrency:
  group: backup-postgres
  cancel-in-progress: false

jobs:
  backup:
    name: Dump postgres and upload to S3
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Configure AWS credentials via OIDC
        # Exchanges GitHub's OIDC JWT for short-lived AWS credentials. No
        # long-lived keys stored anywhere. Credentials live ~1 hour, only
        # exist in this job's environment.
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_BACKUP_ROLE_ARN }}
          role-session-name: gh-backup-${{ github.run_id }}
          aws-region: af-south-1

      - name: Verify AWS identity
        run: |
          aws sts get-caller-identity
          echo "Bucket reachable check (expects 403 — proves auth + lockdown):"
          # HeadObject on a nonexistent key. Without s3:GetObject we get
          # 403; with s3:GetObject we'd get 404. Either proves auth works
          # and the policy is locked down to write-only.
          aws s3api head-object \
            --bucket fidexa-db-backups \
            --key money-lending/__noexist__ 2>&1 \
            | head -3 || true

      - name: Dump postgres and stream to S3
        env:
          SSH_KEY: ${{ secrets.ELECTRIC_SSH_KEY }}
          SSH_HOST: ${{ secrets.ELECTRIC_SSH_HOST }}
          SSH_USER: ${{ secrets.ELECTRIC_SSH_USER }}
          PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_node
          chmod 600 ~/.ssh/id_node
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          DATE=$(date -u +%F)
          KEY="money-lending/dump_${DATE}.pgcustom"
          echo "Dumping postgres on node1 and streaming to s3://fidexa-db-backups/${KEY}"

          # Pipe pg_dump → SSH stdout → aws s3 cp - (streaming, no temp file).
          # set -o pipefail above ensures a pg_dump failure aborts the upload
          # instead of storing a truncated dump.
          #
          # Custom format (-Fc) is internally compressed with zlib, so we
          # don't gzip on top — that's why no .gz suffix on the key.
          #
          # --no-owner --no-acl strips the `money` role ownership so the
          # dump restores cleanly into a fresh DB regardless of which role
          # the restoring user has.
          ssh -i ~/.ssh/id_node -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" \
            "docker run --rm --network host -e PGPASSWORD='$PG_PASSWORD' postgres:17 \
              pg_dump -Fc --no-owner --no-acl \
              'host=127.0.0.1 port=5432 user=money dbname=money_lending sslmode=require'" \
          | aws s3 cp - "s3://fidexa-db-backups/${KEY}" \
              --storage-class STANDARD_IA \
              --expected-size 100000000

          echo ""
          echo "Backup uploaded: s3://fidexa-db-backups/${KEY}"

      - name: Confirm object exists with reasonable size
        run: |
          set -euo pipefail
          DATE=$(date -u +%F)
          KEY="money-lending/dump_${DATE}.pgcustom"

          # head-object also returns ContentLength, which we sanity check.
          # A truncated dump (set -o pipefail caught nothing) would be small.
          # Current dataset is ~88KB; a sane lower bound is 10KB.
          SIZE=$(aws s3api head-object \
            --bucket fidexa-db-backups \
            --key "$KEY" \
            --query ContentLength \
            --output text)
          echo "Uploaded object size: ${SIZE} bytes"
          if [ "$SIZE" -lt 10000 ]; then
            echo "ERROR: backup is suspiciously small (<10KB) — likely truncated."
            exit 1
          fi
          echo "Backup verified."

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_node
